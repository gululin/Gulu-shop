<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>咕嚕嚕小店 🧸</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Plus+Jakarta+Sans:wght@700;800;900&display=swap" rel="stylesheet" />
<style>
  :root {
    --pink-50: #fff5f7; --pink-100: #ffe4ec; --pink-200: #ffc2d4;
    --pink-300: #ff93b6; --pink-400: #f472b6; --pink-500: #ec4899;
    --rose-400: #fb7185; --rose-500: #f43f5e; --blue-50: #eff6ff;
    --green-500: #22c55e; --gray-400: #9ca3af; --gray-500: #6b7280;
    --gray-700: #374151; --gray-800: #1f2937;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: linear-gradient(160deg, #fff5f7 0%, #ffeef2 50%, #fff0f5 100%);
    min-height: 100vh; min-height: 100dvh;
    color: var(--gray-700); overflow-x: hidden;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background: radial-gradient(ellipse at 20% 20%, rgba(255,182,203,0.25) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 80%, rgba(251,113,133,0.15) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }

  /* LOGIN */
  #login-screen {
    position: fixed; inset: 0; z-index: 9999;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(160deg, #fff5f7 0%, #ffeef2 50%, #fff0f5 100%);
  }
  #login-screen::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse at 30% 30%, rgba(255,182,203,0.3) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 70%, rgba(251,113,133,0.2) 0%, transparent 60%);
  }
  .login-box {
    position: relative; z-index: 1;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(24px);
    border: 1px solid rgba(255,182,203,0.3);
    border-radius: 36px;
    padding: 48px 36px;
    width: 88%; max-width: 380px;
    box-shadow: 0 20px 60px rgba(244,114,182,0.15);
    text-align: center;
  }
  .login-icon {
    width: 80px; height: 80px;
    background: linear-gradient(135deg, #f9a8d4, #fb7185);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 38px; margin: 0 auto 20px;
    box-shadow: 0 8px 28px rgba(244,114,182,0.35);
  }
  .login-title {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 26px; font-weight: 900; color: var(--gray-800);
    margin-bottom: 4px; letter-spacing: -0.5px;
  }
  .login-sub { font-size: 12px; color: var(--gray-400); font-weight: 700; margin-bottom: 32px; }
  .login-input {
    width: 100%; padding: 16px 20px;
    background: rgba(255,182,203,0.1);
    border: 1.5px solid rgba(255,182,203,0.3);
    border-radius: 18px; font-size: 18px;
    text-align: center; letter-spacing: 4px;
    color: var(--gray-800); font-weight: 900;
    outline: none; margin-bottom: 16px;
    font-family: 'Noto Sans TC', sans-serif;
    transition: border 0.2s, box-shadow 0.2s;
  }
  .login-input:focus {
    border-color: var(--pink-300);
    box-shadow: 0 0 0 3px rgba(244,114,182,0.12);
  }
  .login-btn {
    width: 100%; padding: 18px;
    background: linear-gradient(135deg, var(--pink-500), var(--rose-400));
    color: white; border: none; border-radius: 22px;
    font-size: 16px; font-weight: 900; cursor: pointer;
    box-shadow: 0 8px 28px rgba(244,114,182,0.35);
    font-family: 'Plus Jakarta Sans', sans-serif;
    transition: transform 0.15s;
  }
  .login-btn:active { transform: scale(0.96); }
  .login-error {
    margin-top: 14px; color: var(--rose-500);
    font-size: 13px; font-weight: 700; display: none;
  }
  .login-shake { animation: shake 0.4s ease; }
  @keyframes shake {
    0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-6px)} 80%{transform:translateX(6px)}
  }

  header {
    position: sticky; top: 0; z-index: 200;
    padding: env(safe-area-inset-top, 16px) 24px 16px;
    padding-top: max(env(safe-area-inset-top, 16px), 16px);
    background: rgba(255,255,255,0.7); backdrop-filter: blur(24px);
    border-bottom: 1px solid rgba(255,192,203,0.3);
    display: flex; justify-content: space-between; align-items: center;
  }
  .logo-wrap { display: flex; align-items: center; gap: 12px; cursor: pointer; }
  .logo-icon {
    width: 46px; height: 46px;
    background: linear-gradient(135deg, #f9a8d4, #fb7185);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 16px rgba(244,114,182,0.35); font-size: 22px;
  }
  .logo-text h1 { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 20px; font-weight: 900; color: var(--gray-800); letter-spacing: -0.5px; }
  .logo-text p { font-size: 9px; color: var(--pink-400); font-weight: 900; text-transform: uppercase; letter-spacing: 3px; }
  .finance-btn { background: none; border: none; cursor: pointer; padding: 10px; border-radius: 50%; }
  .finance-btn:active { background: var(--pink-100); transform: scale(0.9); }
  main { max-width: 600px; margin: 0 auto; padding: 28px 18px 120px; position: relative; z-index: 1; }
  .card { background: rgba(255,255,255,0.92); backdrop-filter: blur(12px); border: 1px solid rgba(255,182,203,0.3); border-radius: 28px; padding: 22px; box-shadow: 0 4px 24px rgba(244,114,182,0.08); }
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 28px; }
  .stat-card { background: rgba(255,255,255,0.92); border: 1px solid rgba(255,182,203,0.25); border-radius: 28px; padding: 24px 16px; display: flex; flex-direction: column; align-items: center; box-shadow: 0 4px 20px rgba(244,114,182,0.07); }
  .stat-card .icon-wrap { width: 56px; height: 56px; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 24px; margin-bottom: 10px; }
  .stat-card .icon-wrap.pink { background: var(--pink-50); }
  .stat-card .icon-wrap.rose { background: #fff1f3; }
  .stat-card label { font-size: 9px; color: var(--gray-400); font-weight: 900; text-transform: uppercase; letter-spacing: 2.5px; margin-bottom: 4px; }
  .stat-card .value { font-size: 26px; font-weight: 900; color: var(--gray-800); }
  .stat-card.profit .value { color: var(--rose-500); }
  .menu-main { background: linear-gradient(135deg, var(--pink-400), var(--rose-400)); border: none; border-radius: 28px; width: 100%; padding: 28px 24px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; box-shadow: 0 12px 40px rgba(244,114,182,0.35); transition: transform 0.15s; margin-bottom: 14px; }
  .menu-main:active { transform: scale(0.97); }
  .menu-main .icon-big { background: rgba(255,255,255,0.25); border-radius: 20px; padding: 16px; margin-right: 20px; font-size: 28px; }
  .menu-main .title { font-size: 22px; font-weight: 900; color: white; font-family: 'Plus Jakarta Sans', sans-serif; }
  .menu-main .sub { font-size: 11px; color: rgba(255,255,255,0.8); font-weight: 700; }
  .menu-main .arrow { font-size: 26px; color: rgba(255,255,255,0.6); }
  .menu-row { background: rgba(255,255,255,0.92); border: 1px solid rgba(255,182,203,0.25); border-radius: 28px; width: 100%; display: flex; align-items: center; justify-content: space-between; padding: 20px 22px; cursor: pointer; box-shadow: 0 4px 20px rgba(244,114,182,0.07); transition: transform 0.15s; margin-bottom: 14px; text-align: left; }
  .menu-row:active { transform: scale(0.97); }
  .menu-row .icon-wrap { width: 56px; height: 56px; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 24px; margin-right: 16px; flex-shrink: 0; }
  .menu-row .menu-title { font-size: 19px; font-weight: 900; color: var(--gray-800); }
  .menu-row .menu-sub { font-size: 11px; color: var(--gray-400); font-weight: 700; }
  .menu-row .arrow { font-size: 20px; color: rgba(255,182,203,0.7); }
  nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.96); backdrop-filter: blur(24px); border-top: 1px solid rgba(255,192,203,0.25); padding: 16px 32px env(safe-area-inset-bottom, 16px); display: flex; justify-content: space-between; align-items: center; z-index: 200; border-radius: 32px 32px 0 0; box-shadow: 0 -12px 40px rgba(255,182,203,0.12); }
  .nav-btn { background: none; border: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 5px; padding: 6px 12px; border-radius: 18px; transition: all 0.2s; color: #d1d5db; font-size: 9px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; }
  .nav-btn .nav-icon { font-size: 22px; }
  .nav-btn.active { color: var(--pink-500); transform: scale(1.15); }
  .nav-center-btn { background: linear-gradient(135deg, var(--pink-500), var(--rose-400)); border: none; border-radius: 50%; width: 64px; height: 64px; display: flex; align-items: center; justify-content: center; font-size: 32px; color: white; cursor: pointer; box-shadow: 0 8px 30px rgba(244,114,182,0.5); transition: transform 0.15s; margin-top: -28px; }
  .nav-center-btn:active { transform: scale(0.9); }
  .view { display: none; animation: fadeSlide 0.3s ease; }
  .view.active { display: block; }
  @keyframes fadeSlide { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .page-header { display: flex; align-items: center; gap: 14px; margin-bottom: 24px; }
  .back-btn { width: 44px; height: 44px; background: white; border: none; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; box-shadow: 0 4px 16px rgba(0,0,0,0.08); flex-shrink: 0; }
  .back-btn:active { transform: scale(0.9); }
  .page-title { font-size: 24px; font-weight: 900; color: var(--gray-800); font-family: 'Plus Jakarta Sans', sans-serif; }
  .tab-bar { display: flex; background: rgba(255,182,203,0.15); border-radius: 22px; padding: 6px; margin-bottom: 20px; }
  .tab-btn { flex: 1; padding: 14px 8px; border: none; background: none; border-radius: 16px; font-size: 13px; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; color: var(--gray-400); transition: all 0.2s; }
  .tab-btn.active { background: white; color: var(--pink-500); box-shadow: 0 4px 16px rgba(244,114,182,0.18); transform: scale(1.03); }
  textarea, input, select { font-family: 'Noto Sans TC', sans-serif; font-size: 14px; color: var(--gray-700); background: rgba(255,182,203,0.08); border: 1px solid rgba(255,182,203,0.25); border-radius: 18px; width: 100%; padding: 14px 18px; outline: none; transition: border 0.2s; -webkit-appearance: none; }
  textarea:focus, input:focus, select:focus { border-color: var(--pink-300); box-shadow: 0 0 0 3px rgba(244,114,182,0.12); }
  textarea { resize: none; height: 200px; line-height: 1.7; }
  .field-group { margin-bottom: 16px; }
  .field-label { font-size: 10px; color: var(--pink-400); font-weight: 900; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 6px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .btn-primary { width: 100%; padding: 18px; background: linear-gradient(135deg, var(--pink-500), var(--rose-400)); color: white; border: none; border-radius: 22px; font-size: 16px; font-weight: 900; cursor: pointer; box-shadow: 0 8px 28px rgba(244,114,182,0.35); transition: transform 0.15s; margin-top: 14px; font-family: 'Plus Jakarta Sans', sans-serif; }
  .btn-primary:active { transform: scale(0.96); }
  .btn-secondary { flex: 1; padding: 16px; background: none; border: none; color: var(--gray-400); font-size: 14px; font-weight: 900; cursor: pointer; }
  .btn-green { flex: 2; padding: 16px 24px; background: var(--green-500); color: white; border: none; border-radius: 18px; font-size: 14px; font-weight: 900; cursor: pointer; box-shadow: 0 6px 20px rgba(34,197,94,0.28); transition: transform 0.15s; }
  .btn-green:active { transform: scale(0.96); }
  .btn-dashed { width: 100%; padding: 22px; border: 2px dashed rgba(244,114,182,0.3); border-radius: 28px; background: rgba(255,255,255,0.5); color: var(--pink-400); font-size: 14px; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .parsed-card { background: rgba(255,255,255,0.95); border: 2px solid rgba(255,182,203,0.4); border-radius: 28px; padding: 24px; box-shadow: 0 0 0 6px rgba(255,182,203,0.1); margin-top: 16px; animation: fadeSlide 0.3s ease; }
  .parsed-header { font-size: 20px; font-weight: 900; color: var(--pink-500); margin-bottom: 18px; }
  .parsed-item { display: flex; justify-content: space-between; align-items: center; background: rgba(255,182,203,0.1); border: 1px solid rgba(255,182,203,0.15); border-radius: 16px; padding: 14px 16px; margin-bottom: 10px; }
  .parsed-item-name { font-weight: 700; color: var(--gray-700); }
  .parsed-item-price { font-size: 18px; font-weight: 900; color: var(--pink-500); }
  .unmatched { padding: 12px 16px; background: #fff1f3; color: var(--rose-500); font-size: 12px; font-weight: 700; border-radius: 14px; margin-bottom: 16px; }
  .parsed-actions { display: flex; gap: 12px; align-items: center; }
  .list-item { background: rgba(255,255,255,0.92); border: 1px solid rgba(255,182,203,0.2); border-radius: 24px; padding: 18px 20px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; box-shadow: 0 4px 16px rgba(244,114,182,0.06); }
  .list-stripe { width: 4px; height: 32px; background: linear-gradient(to bottom, var(--pink-300), var(--rose-400)); border-radius: 4px; margin-right: 16px; flex-shrink: 0; }
  .list-item-name { font-size: 17px; font-weight: 900; color: var(--gray-800); }
  .list-item-sub { font-size: 10px; color: var(--gray-400); font-weight: 700; margin-top: 2px; }
  .btn-manage { padding: 8px 18px; background: var(--pink-50); color: var(--pink-500); border: 1px solid rgba(255,182,203,0.35); border-radius: 16px; font-size: 12px; font-weight: 900; cursor: pointer; white-space: nowrap; }
  .btn-del { background: none; border: none; color: #fca5a5; cursor: pointer; padding: 8px; font-size: 18px; }
  .user-avatar { width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, var(--pink-200), var(--rose-400)); display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 900; color: white; flex-shrink: 0; box-shadow: 0 4px 14px rgba(244,114,182,0.25), 0 0 0 4px rgba(255,182,203,0.2); }
  .btn-copy { padding: 12px; background: var(--pink-50); color: var(--pink-400); border: 1px solid rgba(255,182,203,0.3); border-radius: 16px; cursor: pointer; font-size: 18px; }
  .unpaid-badge { font-size: 11px; color: var(--gray-400); font-weight: 700; }
  .unpaid-badge span { color: var(--rose-500); font-weight: 900; }
  .finance-hero { background: linear-gradient(135deg, var(--pink-500), var(--rose-400)); border-radius: 32px; padding: 36px 28px; box-shadow: 0 16px 48px rgba(244,114,182,0.35); position: relative; overflow: hidden; margin-bottom: 20px; }
  .finance-hero::before { content: '💰'; font-size: 120px; position: absolute; right: -10px; top: -20px; opacity: 0.08; transform: rotate(15deg); }
  .finance-hero .label { font-size: 10px; color: rgba(255,255,255,0.75); font-weight: 900; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 6px; }
  .finance-hero .big-num { font-size: 52px; font-weight: 900; color: white; font-family: 'Plus Jakarta Sans', sans-serif; letter-spacing: -2px; }
  .finance-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 24px; margin-top: 24px; }
  .finance-col .sub-label { font-size: 9px; color: rgba(255,255,255,0.65); font-weight: 900; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 4px; }
  .finance-col .sub-num { font-size: 24px; font-weight: 900; color: white; }
  .toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); background: linear-gradient(135deg, var(--pink-500), var(--rose-400)); color: white; padding: 14px 28px; border-radius: 50px; font-weight: 900; font-size: 14px; z-index: 9999; box-shadow: 0 8px 30px rgba(244,114,182,0.5); animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards; white-space: nowrap; }
  @keyframes toastIn { from { opacity:0; transform: translateX(-50%) translateY(-12px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }
  @keyframes toastOut { to { opacity:0; transform: translateX(-50%) translateY(-12px); } }
  .order-chip { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; background: rgba(255,182,203,0.1); border-radius: 14px; margin-bottom: 8px; border: 1px solid rgba(255,182,203,0.15); }
  .order-chip-name { font-size: 13px; font-weight: 700; color: var(--gray-700); }
  .order-chip-price { font-size: 14px; font-weight: 900; color: var(--pink-500); }
  .order-chip-del { background: none; border: none; color: #fca5a5; cursor: pointer; font-size: 16px; padding: 4px; }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--gray-400); }
  .empty-state .emoji { font-size: 64px; margin-bottom: 16px; display: block; }
  .empty-state p { font-size: 15px; font-weight: 700; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-icon">🧸</div>
    <div class="login-title">咕嚕嚕小店</div>
    <div class="login-sub">請輸入密碼以進入系統</div>
    <input class="login-input" type="password" id="pw-input" placeholder="••••••••••" maxlength="20" onkeydown="if(event.key==='Enter')checkPw()" />
    <button class="login-btn" onclick="checkPw()">🔓 進入</button>
    <div class="login-error" id="pw-error">❌ 密碼錯誤，請再試一次</div>
  </div>
</div>

<header>
  <div class="logo-wrap" onclick="navigate('dashboard')">
    <div class="logo-icon">🧸</div>
    <div class="logo-text">
      <h1>咕嚕嚕小店</h1>
      <p>Order System</p>
    </div>
  </div>
  <button class="finance-btn" onclick="navigate('finance')">📊</button>
</header>

<main>
  <div id="view-dashboard" class="view active">
    <div class="stats-grid">
      <div class="stat-card">
        <div class="icon-wrap pink">💰</div>
        <label>本期營收</label>
        <div class="value" id="stat-revenue">$0</div>
      </div>
      <div class="stat-card profit">
        <div class="icon-wrap rose">✨</div>
        <label>預估純利</label>
        <div class="value" id="stat-profit">$0</div>
      </div>
    </div>
    <button class="menu-main" onclick="navigate('import')">
      <div style="display:flex;align-items:center">
        <div class="icon-big">➕</div>
        <div>
          <div class="title">錄入新訂單</div>
          <div class="sub">智慧文字解析或手動填單</div>
        </div>
      </div>
      <div class="arrow">›</div>
    </button>
    <button class="menu-row" onclick="navigate('vendors')">
      <div class="icon-wrap" style="background:#fff0fb;">📦</div>
      <div style="flex:1">
        <div class="menu-title">商品庫存</div>
        <div class="menu-sub" id="vendor-count">0 廠商 | 0 品項</div>
      </div>
      <div class="arrow">›</div>
    </button>
    <button class="menu-row" onclick="navigate('users')">
      <div class="icon-wrap" style="background:var(--blue-50);">👥</div>
      <div style="flex:1">
        <div class="menu-title">客戶對帳中心</div>
        <div class="menu-sub">查看訂單、對帳與出貨狀態</div>
      </div>
      <div class="arrow">›</div>
    </button>
  </div>

  <div id="view-import" class="view">
    <div class="page-header">
      <button class="back-btn" onclick="navigate('dashboard')">‹</button>
      <div class="page-title">錄單匯入</div>
    </div>
    <div class="tab-bar">
      <button class="tab-btn active" id="tab-magic" onclick="switchTab('magic')">🪄 智慧解析</button>
      <button class="tab-btn" id="tab-form" onclick="switchTab('form')">📝 手動填單</button>
    </div>
    <div id="magic-tab">
      <div class="card">
        <textarea id="magic-text" placeholder="貼上客戶訊息，例如：&#10;&#10;Lucy&#10;美樂蒂髮夾 110&#10;小羊毛絨髮夾 160"></textarea>
        <button class="btn-primary" onclick="parseMagic()">✨ 解析文字</button>
      </div>
      <div id="parsed-result"></div>
    </div>
    <div id="form-tab" style="display:none">
      <div class="card">
        <div class="field-group">
          <div class="field-label">客戶姓名 *</div>
          <input type="text" id="f-customer" placeholder="Lucy" list="user-list" />
          <datalist id="user-list"></datalist>
        </div>
        <div class="grid-2">
          <div class="field-group">
            <div class="field-label">聯繫方式</div>
            <input type="text" id="f-contact" placeholder="Line / FB" />
          </div>
          <div class="field-group">
            <div class="field-label">付款方式</div>
            <select id="f-payment">
              <option value="貨到付款">貨到付款</option>
              <option value="定金">收定金</option>
              <option value="全額匯款">全額匯款</option>
            </select>
          </div>
        </div>
        <div class="field-group">
          <div class="field-label">選擇商品 *</div>
          <select id="f-product" onchange="onProductChange()">
            <option value="">— 選擇商品 —</option>
          </select>
        </div>
        <div class="grid-2">
          <div class="field-group">
            <div class="field-label">數量</div>
            <input type="number" id="f-qty" value="1" min="1" />
          </div>
          <div class="field-group">
            <div class="field-label">售價</div>
            <input type="number" id="f-price" placeholder="0" />
          </div>
        </div>
        <div class="field-group">
          <div class="field-label">備注</div>
          <input type="text" id="f-notes" placeholder="顏色、尺寸..." />
        </div>
        <button class="btn-primary" onclick="submitFormOrder()">📋 確認新增訂單</button>
      </div>
    </div>
  </div>

  <div id="view-vendors" class="view">
    <div class="page-header">
      <button class="back-btn" onclick="navigate('dashboard')">‹</button>
      <div class="page-title">廠商清單</div>
    </div>
    <div id="vendor-list"></div>
    <button class="btn-dashed" onclick="addVendor()">➕ 新增廠商</button>
  </div>

  <div id="view-products" class="view">
    <div class="page-header">
      <button class="back-btn" onclick="navigate('vendors')">‹</button>
      <div class="page-title" id="products-title">商品</div>
      <button onclick="addProduct()" style="margin-left:auto;background:linear-gradient(135deg,var(--pink-400),var(--rose-400));border:none;border-radius:50%;width:44px;height:44px;color:white;font-size:22px;cursor:pointer;box-shadow:0 4px 16px rgba(244,114,182,0.35)">+</button>
    </div>
    <div id="product-list"></div>
  </div>

  <div id="view-users" class="view">
    <div class="page-header">
      <button class="back-btn" onclick="navigate('dashboard')">‹</button>
      <div class="page-title">客戶中心</div>
    </div>
    <div id="user-list"></div>
  </div>

  <div id="view-user-detail" class="view">
    <div class="page-header">
      <button class="back-btn" onclick="navigate('users')">‹</button>
      <div class="page-title" id="user-detail-title">客戶</div>
      <button onclick="copyCheckoutForCurrent()" style="margin-left:auto;background:var(--pink-50);border:1px solid rgba(255,182,203,.4);border-radius:16px;padding:10px 16px;color:var(--pink-500);font-weight:900;font-size:13px;cursor:pointer;">📋 對帳單</button>
    </div>
    <div id="user-order-list"></div>
  </div>

  <div id="view-finance" class="view">
    <div class="page-header">
      <button class="back-btn" onclick="navigate('dashboard')">‹</button>
      <div class="page-title">財務統籌分析</div>
    </div>
    <div class="finance-hero">
      <div class="label">本期純利潤</div>
      <div class="big-num" id="fin-profit">$0</div>
      <div class="finance-grid">
        <div class="finance-col"><div class="sub-label">銷售總額</div><div class="sub-num" id="fin-revenue">$0</div></div>
        <div class="finance-col"><div class="sub-label">採購成本</div><div class="sub-num" id="fin-cost">$0</div></div>
      </div>
    </div>
    <div class="card">
      <div style="font-size:12px;color:var(--gray-400);font-weight:700;text-transform:uppercase;letter-spacing:2px;margin-bottom:16px;">訂單明細</div>
      <div id="finance-order-list"></div>
    </div>
  </div>
</main>

<nav>
  <button class="nav-btn active" id="nav-dashboard" onclick="navigate('dashboard')">
    <div class="nav-icon">🏠</div><span>首頁</span>
  </button>
  <button class="nav-btn" id="nav-vendors" onclick="navigate('vendors')">
    <div class="nav-icon">📦</div><span>商品</span>
  </button>
  <button class="nav-center-btn" onclick="navigate('import')">➕</button>
  <button class="nav-btn" id="nav-users" onclick="navigate('users')">
    <div class="nav-icon">👥</div><span>客戶</span>
  </button>
  <button class="nav-btn" id="nav-finance" onclick="navigate('finance')">
    <div class="nav-icon">📊</div><span>財務</span>
  </button>
</nav>

<script>
// 密碼驗證
const PW = 'gululin1028';
function checkPw() {
  const val = document.getElementById('pw-input').value;
  const box = document.querySelector('.login-box');
  const err = document.getElementById('pw-error');
  if (val === PW) {
    sessionStorage.setItem('gululu_auth', '1');
    document.getElementById('login-screen').style.display = 'none';
  } else {
    err.style.display = 'block';
    box.classList.remove('login-shake');
    void box.offsetWidth;
    box.classList.add('login-shake');
    document.getElementById('pw-input').value = '';
  }
}
// 如果這次 session 已登入就跳過
if (sessionStorage.getItem('gululu_auth') === '1') {
  document.getElementById('login-screen').style.display = 'none';
}

// 資料存取
const STORE = {
  get: (k) => { try { return JSON.parse(localStorage.getItem('gululu_' + k)) || []; } catch { return []; } },
  set: (k, v) => { localStorage.setItem('gululu_' + k, JSON.stringify(v)); }
};
const genId = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
let currentView = 'dashboard', currentVendor = null, currentUser = null;

function getData() {
  return { vendors: STORE.get('vendors'), products: STORE.get('products'), orders: STORE.get('orders') };
}
function navigate(view) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  const el = document.getElementById('view-' + view);
  if (el) { el.classList.add('active'); currentView = view; }
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const nb = document.getElementById('nav-' + view);
  if (nb) nb.classList.add('active');
  renderView(view);
}
function renderView(view) {
  const { vendors, products, orders } = getData();
  const revenue = orders.reduce((s, o) => s + (o.price * o.quantity), 0);
  const cost = products.reduce((s, p) => { const qty = orders.filter(o => o.productId === p.id).reduce((q, ord) => q + ord.quantity, 0); return s + (p.cost * qty); }, 0);
  const profit = revenue - cost;
  if (view === 'dashboard') {
    document.getElementById('stat-revenue').textContent = '$' + revenue.toLocaleString();
    document.getElementById('stat-profit').textContent = '$' + profit.toLocaleString();
    document.getElementById('vendor-count').textContent = vendors.length + ' 廠商 | ' + products.length + ' 品項';
  }
  if (view === 'vendors') renderVendors();
  if (view === 'products') renderProducts();
  if (view === 'users') renderUsers();
  if (view === 'user-detail') renderUserDetail();
  if (view === 'finance') {
    document.getElementById('fin-revenue').textContent = '$' + revenue.toLocaleString();
    document.getElementById('fin-cost').textContent = '$' + cost.toLocaleString();
    document.getElementById('fin-profit').textContent = '$' + profit.toLocaleString();
    renderFinanceOrders();
  }
  if (view === 'import') { populateProductSelect(); populateUserDatalist(); }
}
function renderVendors() {
  const { vendors, products } = getData();
  const el = document.getElementById('vendor-list');
  if (!vendors.length) { el.innerHTML = '<div class="empty-state"><span class="emoji">🏪</span><p>尚未新增廠商</p></div>'; return; }
  el.innerHTML = vendors.map(v => { const count = products.filter(p => p.vendorId === v.id).length; return `<div class="list-item"><div class="list-stripe"></div><div style="flex:1"><div class="list-item-name">${v.name}</div><div class="list-item-sub">${count} 個品項</div></div><button class="btn-manage" onclick="openProducts('${v.id}')">管理品項</button><button class="btn-del" onclick="deleteVendor('${v.id}')">🗑</button></div>`; }).join('');
}
function addVendor() { const name = prompt('廠商名稱：'); if (!name || !name.trim()) return; const vendors = STORE.get('vendors'); vendors.push({ id: genId(), name: name.trim() }); STORE.set('vendors', vendors); renderVendors(); toast('廠商已新增 🏪'); }
function deleteVendor(id) { if (!confirm('確定刪除此廠商？')) return; STORE.set('vendors', STORE.get('vendors').filter(v => v.id !== id)); STORE.set('products', STORE.get('products').filter(p => p.vendorId !== id)); renderVendors(); toast('已刪除廠商'); }
function openProducts(vendorId) { currentVendor = STORE.get('vendors').find(v => v.id === vendorId); navigate('products'); }
function renderProducts() {
  if (!currentVendor) return;
  document.getElementById('products-title').textContent = currentVendor.name;
  const products = STORE.get('products').filter(p => p.vendorId === currentVendor.id);
  const el = document.getElementById('product-list');
  if (!products.length) { el.innerHTML = '<div class="empty-state"><span class="emoji">🛍️</span><p>尚未新增商品</p></div>'; return; }
  el.innerHTML = products.map(p => `<div class="list-item"><div style="flex:1"><div class="list-item-name">${p.name}</div><div class="list-item-sub">成本 $${p.cost} | 售價 $${p.price} | ${p.depositRate}成定 | ${p.arrivalTime || '時間待定'}</div></div><button class="btn-del" onclick="deleteProduct('${p.id}')">🗑</button></div>`).join('');
}
function addProduct() {
  if (!currentVendor) return;
  const name = prompt('商品名稱：'); if (!name || !name.trim()) return;
  const cost = prompt('成本價：'); const price = prompt('售價：');
  const dr = prompt('定金成數 (1-10)：'); const ar = prompt('預估抵台時間：');
  const products = STORE.get('products');
  products.push({ id: genId(), vendorId: currentVendor.id, name: name.trim(), cost: Number(cost) || 0, price: Number(price) || 0, depositRate: Number(dr) || 0, arrivalTime: ar || '', status: '接單中' });
  STORE.set('products', products); renderProducts(); toast('商品已新增 ✅');
}
function deleteProduct(id) { if (!confirm('確定刪除？')) return; STORE.set('products', STORE.get('products').filter(p => p.id !== id)); renderProducts(); toast('已刪除商品'); }
function addOrder(orderData) {
  const products = STORE.get('products'); const prod = products.find(p => p.id === orderData.productId); const dr = prod?.depositRate || 0;
  let depositPaid = 0;
  if (orderData.paymentMethod === '定金') depositPaid = Math.ceil(orderData.price * orderData.quantity * (dr / 10));
  else if (orderData.paymentMethod === '全額匯款') depositPaid = orderData.price * orderData.quantity;
  const orders = STORE.get('orders');
  orders.push({ id: genId(), ...orderData, depositPaid, unpaid: (orderData.price * orderData.quantity) - depositPaid, shipStatus: '⏳', payStatus: '未結帳', createdAt: new Date().toISOString() });
  STORE.set('orders', orders);
}
function deleteOrder(id) { if (!confirm('刪除此訂單？')) return; STORE.set('orders', STORE.get('orders').filter(o => o.id !== id)); renderUserDetail(); toast('訂單已刪除'); }
function switchTab(tab) {
  document.getElementById('magic-tab').style.display = tab === 'magic' ? 'block' : 'none';
  document.getElementById('form-tab').style.display = tab === 'form' ? 'block' : 'none';
  document.getElementById('tab-magic').className = 'tab-btn' + (tab === 'magic' ? ' active' : '');
  document.getElementById('tab-form').className = 'tab-btn' + (tab === 'form' ? ' active' : '');
}
let parsedData = null;
function parseMagic() {
  const text = document.getElementById('magic-text').value.trim();
  if (!text) { toast('請輸入訂單文字 📝'); return; }
  const lines = text.split('\n').map(l => l.trim()).filter(l => l);
  if (lines.length < 2) { toast('請至少輸入姓名和一個商品'); return; }
  const customerName = lines[0]; const products = STORE.get('products'); const items = []; const unmatched = [];
  for (let i = 1; i < lines.length; i++) {
    const line = lines[i]; const pm = line.match(/(\d+)\s*$/); const price = pm ? parseInt(pm[1]) : null;
    const productName = pm ? line.replace(pm[0], '').trim() : line;
    const match = products.find(p => productName.includes(p.name) || p.name.includes(productName) || p.name.toLowerCase().includes(productName.toLowerCase()));
    if (match) items.push({ product: match, finalPrice: price !== null ? price : match.price, raw: line });
    else unmatched.push(line);
  }
  parsedData = { customerName, items, unmatched };
  document.getElementById('parsed-result').innerHTML = `<div class="parsed-card"><div class="parsed-header">👤 客戶：${customerName}</div>${items.map(it => `<div class="parsed-item"><div class="parsed-item-name">${it.product.name}</div><div class="parsed-item-price">$${it.finalPrice}</div></div>`).join('')}${unmatched.length ? `<div class="unmatched">⚠️ 無法辨識：${unmatched.join('、')}</div>` : ''}<div class="parsed-actions"><button class="btn-secondary" onclick="document.getElementById('parsed-result').innerHTML='';parsedData=null;">重設</button><button class="btn-green" onclick="executeMagicImport()">✅ 確認匯入訂單</button></div></div>`;
}
function executeMagicImport() {
  if (!parsedData || !parsedData.items.length) { toast('沒有可匯入的訂單'); return; }
  for (const item of parsedData.items) addOrder({ customerName: parsedData.customerName, productId: item.product.id, productName: item.product.name, price: item.finalPrice, quantity: 1, paymentMethod: item.product.depositRate > 0 ? '定金' : '貨到付款', notes: '' });
  toast(parsedData.customerName + ' 的訂單匯入成功！🪄');
  parsedData = null; document.getElementById('magic-text').value = ''; document.getElementById('parsed-result').innerHTML = ''; navigate('users');
}
function populateProductSelect() { const products = STORE.get('products'); document.getElementById('f-product').innerHTML = '<option value="">— 選擇商品 —</option>' + products.map(p => `<option value="${p.id}">${p.name} ($${p.price})</option>`).join(''); }
function populateUserDatalist() { const orders = STORE.get('orders'); const names = [...new Set(orders.map(o => o.customerName))]; document.getElementById('user-list').innerHTML = names.map(n => `<option value="${n}">`).join(''); }
function onProductChange() { const p = STORE.get('products').find(x => x.id === document.getElementById('f-product').value); if (p) document.getElementById('f-price').value = p.price; }
function submitFormOrder() {
  const customerName = document.getElementById('f-customer').value.trim();
  const productId = document.getElementById('f-product').value;
  const qty = parseInt(document.getElementById('f-qty').value) || 1;
  const price = parseFloat(document.getElementById('f-price').value) || 0;
  const paymentMethod = document.getElementById('f-payment').value;
  const notes = document.getElementById('f-notes').value.trim();
  if (!customerName) { toast('請填寫客戶姓名 👤'); return; }
  if (!productId) { toast('請選擇商品 📦'); return; }
  const prod = STORE.get('products').find(p => p.id === productId);
  addOrder({ customerName, productId, productName: prod?.name || '', price, quantity: qty, paymentMethod, notes, contact: document.getElementById('f-contact').value.trim() });
  toast('訂單已新增 🎉');
  ['f-customer', 'f-product', 'f-qty', 'f-price', 'f-notes', 'f-contact'].forEach(id => { const el = document.getElementById(id); if (el) el.value = id === 'f-qty' ? 1 : ''; });
  navigate('users');
}
function renderUsers() {
  const orders = STORE.get('orders'); const names = [...new Set(orders.map(o => o.customerName))]; const el = document.getElementById('user-list');
  if (!names.length) { el.innerHTML = '<div class="empty-state"><span class="emoji">👥</span><p>尚未有客戶訂單</p></div>'; return; }
  el.innerHTML = names.map(name => { const uOrders = orders.filter(o => o.customerName === name); const unpaid = uOrders.reduce((s, o) => s + (o.unpaid || 0), 0); return `<div class="list-item" style="cursor:pointer" onclick="openUserDetail('${name}')"><div class="user-avatar">${name.charAt(0)}</div><div style="flex:1;margin-left:16px"><div class="list-item-name">${name}</div><div class="unpaid-badge">待收餘額：<span>$${unpaid.toLocaleString()}</span></div></div><button class="btn-copy" onclick="event.stopPropagation();copyCheckout('${name}')">📋</button></div>`; }).join('');
}
function openUserDetail(name) { currentUser = name; navigate('user-detail'); }
function renderUserDetail() {
  if (!currentUser) return;
  document.getElementById('user-detail-title').textContent = currentUser;
  const orders = STORE.get('orders').filter(o => o.customerName === currentUser); const el = document.getElementById('user-order-list');
  if (!orders.length) { el.innerHTML = '<div class="empty-state"><span class="emoji">🛒</span><p>沒有訂單記錄</p></div>'; return; }
  const total = orders.reduce((s, o) => s + o.price * o.quantity, 0); const paid = orders.reduce((s, o) => s + (o.depositPaid || 0), 0);
  el.innerHTML = `<div style="margin-bottom:16px">${orders.map(o => `<div class="order-chip"><div><div class="order-chip-name">${o.productName} × ${o.quantity}</div><div style="font-size:10px;color:var(--gray-400);font-weight:700">${o.paymentMethod} | ${o.shipStatus} ${o.payStatus}</div></div><div style="display:flex;align-items:center;gap:8px"><div class="order-chip-price">$${(o.price * o.quantity).toLocaleString()}</div><button class="order-chip-del" onclick="deleteOrder('${o.id}')">🗑</button></div></div>`).join('')}</div><div class="card" style="background:rgba(255,182,203,0.07)"><div style="display:flex;justify-content:space-between;margin-bottom:10px"><span style="font-size:13px;color:var(--gray-500);font-weight:700">商品總額</span><span style="font-size:15px;font-weight:900;color:var(--gray-800)">$${total.toLocaleString()}</span></div><div style="display:flex;justify-content:space-between;margin-bottom:10px"><span style="font-size:13px;color:var(--gray-500);font-weight:700">已付金額</span><span style="font-size:15px;font-weight:900;color:var(--green-500)">$${paid.toLocaleString()}</span></div><div style="display:flex;justify-content:space-between;padding-top:12px;border-top:1px solid rgba(255,182,203,0.3)"><span style="font-size:14px;color:var(--pink-500);font-weight:900">剩餘未付</span><span style="font-size:18px;font-weight:900;color:var(--rose-500)">$${(total - paid).toLocaleString()}</span></div></div>`;
}
function copyCheckoutForCurrent() { if (currentUser) copyCheckout(currentUser); }
function copyCheckout(name) {
  const orders = STORE.get('orders').filter(o => o.customerName === name); const products = STORE.get('products');
  if (!orders.length) { toast('此客戶沒有訂單'); return; }
  const total = orders.reduce((s, o) => s + (o.price * o.quantity), 0); const paid = orders.reduce((s, o) => s + (o.depositPaid || 0), 0);
  const prod = products.find(p => p.id === orders[0]?.productId); const arrival = prod?.arrivalTime || '待通知';
  let msg = `🧸 咕嚕嚕小店 - 對帳單 🧸\n客戶名：${name}\n購買商品：\n`;
  orders.forEach(o => msg += `- ${o.productName} / x${o.quantity} / $${o.price}\n`);
  msg += `\n商品總額：$${total.toLocaleString()} (+運費/二補待計)\n已付金額：$${paid.toLocaleString()}\n剩餘金額：$${(total - paid).toLocaleString()}\n抵台時間：${arrival}\n\n*匯款資訊*\n824 連線商業銀行\n帳號：XXXX-XXXX-XXXX\n請提供截圖或後五碼核對。`;
  if (navigator.clipboard) navigator.clipboard.writeText(msg).then(() => toast('對帳訊息已複製 💖'));
  else { const el = document.createElement('textarea'); el.value = msg; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el); toast('對帳訊息已複製 💖'); }
}
function renderFinanceOrders() {
  const orders = STORE.get('orders'); const el = document.getElementById('finance-order-list');
  if (!orders.length) { el.innerHTML = '<div style="text-align:center;color:var(--gray-400);padding:20px;font-weight:700">尚無訂單</div>'; return; }
  const names = [...new Set(orders.map(o => o.customerName))];
  el.innerHTML = names.map(name => { const uOrders = orders.filter(o => o.customerName === name); const subtotal = uOrders.reduce((s, o) => s + o.price * o.quantity, 0); return `<div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid rgba(255,182,203,0.15)"><div><div style="font-weight:900;color:var(--gray-700)">${name}</div><div style="font-size:11px;color:var(--gray-400)">${uOrders.length} 筆訂單</div></div><div style="font-weight:900;color:var(--pink-500)">$${subtotal.toLocaleString()}</div></div>`; }).join('');
}
function toast(msg) { const existing = document.querySelector('.toast'); if (existing) existing.remove(); const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg; document.body.appendChild(t); setTimeout(() => { if (t.parentNode) t.remove(); }, 3000); }
navigate('dashboard');
</script>
</body>
